version: '3.8'

# Named volumes — WAL data survives container restarts
volumes:
  node-a-data:
  node-b-data:
  node-c-data:
  prometheus-data:
  grafana-data:

networks:
  zenith-net:
    driver: bridge

services:

  node-a:
    build: .
    container_name: zenith-node-a
    ports:
      - "9001:9001"   # Raft + client commands
      - "8081:8001"   # Metrics (host:8081 → container:8080)
    command: ["node-a", "9001", "node-b:9002", "node-c:9003"]
    volumes:
      - node-a-data:/data
    networks:
      - zenith-net
    restart: unless-stopped
    # FIX 1: healthcheck must live on node-a (not node-b)
    # node-b says depends_on node-a with condition: service_healthy
    # If node-a has no healthcheck, Docker can never mark it healthy → node-b hangs forever
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9001"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node-b:
    build: .
    container_name: zenith-node-b
    ports:
      - "9002:9002"
      - "8082:8002"
    command: ["node-b", "9002", "node-a:9001", "node-c:9003"]
    volumes:
      - node-b-data:/data
    networks:
      - zenith-net
    restart: unless-stopped
    # FIX 2: removed misplaced healthcheck from here (it was on the wrong service)
    # FIX 3: correct depends_on syntax — waits for node-a to pass healthcheck before starting
    depends_on:
      node-a:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9002"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node-c:
    build: .
    container_name: zenith-node-c
    ports:
      - "9003:9003"
      - "8083:8003"
    command: ["node-c", "9003", "node-a:9001", "node-b:9002"]
    volumes:
      - node-c-data:/data
    networks:
      - zenith-net
    restart: unless-stopped
    # FIX 4: upgraded node-c depends_on to also use service_healthy (was bare list before)
    depends_on:
      node-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9003"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - zenith-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana-dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./monitoring/zenith-dashboard.json:/var/lib/grafana/dashboards/zenith-dashboard.json:ro
    depends_on:
      - prometheus
    networks:
      - zenith-net
    restart: unless-stopped